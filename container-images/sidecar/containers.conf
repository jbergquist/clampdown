# Hardened defaults for all nested containers (podman run, podman build,
# podman exec). The OCI hook enforces these as a backstop; this config
# makes simple commands secure out of the box.

# See https://github.com/containers/common/blob/master/pkg/config/containers.conf
[engine]
cgroup_manager = "cgroupfs"
events_logger="file"

[containers]
seccomp_profile = "/etc/containers/seccomp_nested.json"
no_new_privileges = true
base_hosts_file = "none"
stop_timeout = 5
default_capabilities = [
    "CHOWN",
    "DAC_OVERRIDE",
    "FOWNER",
    "FSETID",
    "KILL",
    "NET_BIND_SERVICE",
    "SETFCAP",
    "SETGID",
    "SETPCAP",
    "SETUID",
]
pids_limit = 4096
# seal-inject will take care of enforcing this.
init = true
init_path = "/sandbox-seal"
default_ulimits = [
    "core=0:0",
]

volumes = [
# EXDEV rename shim — overlayfs returns EXDEV on cross-layer renames, breaking
# cargo, rustc, pip, etc.  Injected via volumes + env so it covers both
# podman run and podman build (precreate hooks skip build containers).
    "/rename_exdev_shim.so:/.sandbox/rename_exdev_shim.so:ro",
# Mask sensitive /proc and /sys files to prevent info disclosure aiding
# kernel exploit development.
    "/dev/null:/proc/devices:ro",
    "/dev/null:/proc/diskstats:ro",
    "/dev/null:/proc/kallsyms:ro",
    "/dev/null:/proc/kcore:ro",
    "/dev/null:/proc/modules:ro",
    "/dev/null:/proc/partitions:ro",
    "/dev/null:/proc/version:ro",
    "/dev/null:/sys/kernel/vmcoreinfo:ro",
    "/dev/null:/proc/sysrq-trigger:ro",
    "/empty:/sys/devices/virtual/dmi:ro",
    "/empty:/sys/fs/bpf:ro",
    "/empty:/sys/kernel/debug:ro",
    "/empty:/sys/kernel/security:ro",
    "/empty:/sys/kernel/tracing:ro",
    "/empty:/sys/module:ro",
]
env = [
    "LD_PRELOAD=/.sandbox/rename_exdev_shim.so",
# Also we inject a rw HOME, we run as $USER and usually containers do not have
# An home, so it will default to /root and have permission problems.
    "HOME=/tmp",
]
[network]
default_network = "podman"
# Use a different subnet than the outer podman bridge (10.88.0.0/16).
# Without this, VM-based runtimes (podman machine) that place the sidecar
# on 10.88.0.0/16 cause a routing conflict with the inner bridge
default_subnet = "10.89.0.0/16"
